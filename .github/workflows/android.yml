name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Build and Find APK
        id: build_apk
        run: |
          ./gradlew assembleDebug
          echo "=== Build completed ==="
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "APK found at: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "TurkceAI v${{ github.run_number }}"
          body: |
            🚀 Türkçe AI Sohbet Uygulaması
            
            **Versiyon:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ✨ Özellikler:
            - Kotlin + Jetpack Compose
            - Türkçe yapay zeka sohbet
            - Modern Material3 UI
          files: |
            ${{ steps.build_apk.outputs.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
