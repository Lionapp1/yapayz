name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run lint
      run: ./gradlew lintDebug

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Fix Gradle permissions
      run: chmod +x gradlew

    - name: Build Debug APK
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log
        echo "exit_code=$?" >> $GITHUB_OUTPUT

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore

    - name: Check Build Result
      run: |
        if [ "${{ steps.build.outputs.exit_code }}" != "0" ]; then
          echo "BUILD FAILED with exit code: ${{ steps.build.outputs.exit_code }}"
          cat build.log | tail -100
          exit 1
        fi
        echo "Build successful"

    - name: Verify APK exists
      run: |
        echo "Listing build outputs:"
        find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests with coverage
      run: ./gradlew testDebugUnitTest jacocoTestReport

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Download APK Artifact
      uses: actions/download-artifact@v4
      with:
        name: app-apk
        path: ./apk/

    - name: List APK files
      run: |
        echo "APK files:"
        ls -la ./apk/
        ls -la ./apk/*.apk

    - name: Rename APK
      id: apk-info
      run: |
        APK_FILE=$(ls ./apk/*.apk | head -n 1)
        NEW_NAME="./apk/TurkceAI-v${{ github.run_number }}.apk"
        mv "$APK_FILE" "$NEW_NAME"
        echo "apk_path=$NEW_NAME" >> $GITHUB_OUTPUT
        echo "Found and renamed: $NEW_NAME"

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          🚀 Yeni sürüm: Release v${{ github.run_number }}
          
          ✨ Özellikler:
          - Türkçe AI Sohbet uygulaması
          - Jetpack Compose ile modern UI  
          - Hugging Face API entegrasyonu
          
          📱 Kurulum:
          `TurkceAI-v${{ github.run_number }}.apk` dosyasını indirip kurun.
        files: ${{ steps.apk-info.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
