name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Decode Keystore
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "Checking keystore secret..."
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Secret found, decoding..."
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
            echo "Keystore file created at: $(pwd)/app/release.keystore"
            ls -la app/release.keystore
            file app/release.keystore
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "Keystore decoded successfully"
          else
            echo "ERROR: KEYSTORE_BASE64 secret is empty!"
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Keystore Before Build
        if: steps.decode_keystore.outputs.has_keystore == 'true'
        run: |
          echo "Verifying keystore file..."
          ls -la app/release.keystore || echo "File not found!"
          file app/release.keystore || echo "Cannot check file type"
          echo "KEYSTORE_PATH will be: $(pwd)/app/release.keystore"

      - name: Build Android App (Release - Signed)
        if: steps.decode_keystore.outputs.has_keystore == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Environment variables:"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH"
          echo "KEY_ALIAS=$KEY_ALIAS"
          test -f "$KEYSTORE_PATH" && echo "Keystore file exists" || echo "Keystore file NOT FOUND"
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Android App (Debug - Unsigned)
        if: steps.decode_keystore.outputs.has_keystore != 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find app/build -name "*.apk" | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Son 10 commit mesajını al
          echo "### 📋 Son Değişiklikler" > release_notes.md
          echo "" >> release_notes.md
          git log --oneline -10 --no-decorate >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🆕 Bu Sürümde Neler Var?" >> release_notes.md
          echo "- ✅ APK imzalama tamamlandı" >> release_notes.md
          echo "- ✅ DEX Editor Plus geliştirildi" >> release_notes.md
          echo "- ✅ Text Editor eklendi" >> release_notes.md
          echo "- ✅ Smali ve XML syntax highlighting" >> release_notes.md
          echo "- ✅ Hızlı arama ve gezinme" >> release_notes.md
          echo "- ✅ Hafıza ve performans optimizasyonları" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📱 APK Bilgileri" >> release_notes.md
          echo "- **Paket Adı:** com.apkpro.editor" >> release_notes.md
          echo "- **Min SDK:** 26 (Android 8.0)" >> release_notes.md
          echo "- **Target SDK:** 34 (Android 14)" >> release_notes.md
          echo "- **İmzalama:** ✅ İmzalı" >> release_notes.md
          echo "" >> release_notes.md
          echo "### ⚠️ Notlar" >> release_notes.md
          echo "- APK'yi yükleyebilmek için 'Bilinmeyen Kaynaklar' izni vermeniz gerekebilir" >> release_notes.md
          echo "- Yedek almayı unutmayın!" >> release_notes.md
          cat release_notes.md

      - name: Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: apkeditor pro v${{ github.run_number }}
          body_path: release_notes.md
          files: ${{ steps.apk.outputs.path }}
