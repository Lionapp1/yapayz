name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug
          echo "Build finished. Listing all files:"
          ls -la
          echo "=== Looking for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found in project"
          echo "=== Build directory ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"

      - name: Check APK
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK file found!"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_ENV

      - name: Upload to Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "TurkceAI v${{ github.run_number }}"
          body: |
            🚀 Türkçe AI Sohbet Uygulaması
            
            **Versiyon:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ✨ Özellikler:
            - Kotlin + Jetpack Compose
            - Türkçe yapay zeka sohbet
            - Modern Material3 UI
            
            📱 Kurulum:
            APK dosyasını indirip Android cihazınıza kurun.
          files: ${{ env.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
